<svg width="500" height="330" viewBox="0 0 500 330" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <rect x="0" y="0" width="500" height="330" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
    <text x="5" y="10" font-family="Arial" font-size="5" fill="#555">Template 3 (Rücken: 35)</text>

    <g id="group-u4" transform="translate(17.5, 0)">
        <rect id="u4-background" x="0" y="14" width="215" height="302" fill="lightgoldenrodyellow" />
        <text id="text-author" x="20" y="170" font-family="Georgia" font-size="10" fill="#222">Drittautor</text>
        <rect id="color-target-u4" x="25" y="50" width="60" height="35" fill="green" />
        <text x="5" y="25" font-family="Arial" font-size="6" fill="#333">U4</text>
    </g>

    <g id="group-spine" transform="translate(232.5, 0)">
        <rect id="spine-bg" x="0" y="14" width="35" height="302" fill="grey" />
        <text id="text-spine-title" 
              x="17.5" 
              y="165" 
              font-family="Georgia" 
              font-size="7" 
              fill="#FFF" 
              text-anchor="middle" 
              dominant-baseline="middle"
              transform="rotate(90 17.5 165)">Nummer 3</text>
    </g>

    <g id="group-u1" transform="translate(267.5, 0)">
        <rect id="u1-background" x="0" y="14" width="215" height="302" fill="lightpink" />
        <text id="text-title" x="20" y="130" font-family="Georgia" font-size="20" fill="#222">Titel Nummer Drei</text>
        <text id="text-subtitle" x="20" y="155" font-family="Georgia" font-size="11" fill="#222">Der dritte Untertitel</text>
        <rect id="color-target-u1" x="100" y="230" width="100" height="40" fill="darkviolet" />
         <text x="210" y="25" font-family="Arial" font-size="6" fill="#333" text-anchor="end">U1</text>
    </g>
</svg>
