<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testumgebung für Buchdecken-Editor</title>
    
    <!-- Tailwind CSS für schnelles und ansprechendes Styling der Testseite -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Spezifische Styles für das Editor-Modal und seine Komponenten -->
    <link rel="stylesheet" href="kalkulator/editor-styles.css">

    <style>
        /* Zusätzliche Basis-Styles */
        body {
            font-family: 'Inter', sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="container mx-auto p-4 md:p-8">
        
        <header class="mb-8 p-6 bg-white rounded-lg shadow">
            <h1 class="text-3xl font-bold text-gray-900">Testumgebung für den Buchdecken-Editor</h1>
            <p class="mt-2 text-gray-600">
                Diese Seite dient zum Testen des Editor-Moduls. Sie simuliert den Aufruf aus der Hauptanwendung.
            </p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Linke Spalte: Konfiguration und Steuerung -->
            <div class="p-6 bg-white rounded-lg shadow">
                <h2 class="text-2xl font-semibold mb-4 border-b pb-2">1. Konfiguration</h2>
                
                <div class="space-y-4">
                    <div>
                        <label for="spine-width-input" class="block text-sm font-medium text-gray-700 mb-1">Buchrückenbreite (mm)</label>
                        <input type="number" id="spine-width-input" value="25" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                    
                    <div>
                        <label for="initial-text-title" class="block text-sm font-medium text-gray-700 mb-1">Initialer Titel (optional)</label>
                        <input type="text" id="initial-text-title" value="Meine Dissertation" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>

                     <div>
                        <label for="initial-text-author" class="block text-sm font-medium text-gray-700 mb-1">Initialer Autor (optional)</label>
                        <input type="text" id="initial-text-author" value="Dr. Max Mustermann" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>

                </div>

                <div class="mt-8">
                    <button id="launch-editor-button" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
                        Hardcover-Editor starten
                    </button>
                </div>
            </div>

            <!-- Rechte Spalte: Ergebnis-Anzeige -->
            <div class="p-6 bg-white rounded-lg shadow">
                <h2 class="text-2xl font-semibold mb-4 border-b pb-2">2. Ergebnis</h2>
                <div id="result-output" class="space-y-4 text-sm">
                    <p class="text-gray-500">Nach dem Bestätigen des Editors werden die Ergebnisse hier angezeigt.</p>
                </div>
            </div>

        </main>
        
    </div>

    <!-- Das Haupt-Skript, das die Logik steuert und den Editor importiert -->
    <script type="module" src="test-runner.js"></script>
</body>
</html>
