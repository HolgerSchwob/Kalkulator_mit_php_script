<svg width="500" height="330" viewBox="0 0 500 330" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <rect x="0" y="0" width="500" height="330" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
    <text x="5" y="10" font-family="Arial" font-size="5" fill="#555">Template 4 (Rücken: 35)</text>

    <g id="group-u4" transform="translate(17.5, 0)">
        <rect id="u4-background" x="0" y="14" width="215" height="302" fill="lightskyblue" />
        <text id="text-author" x="8" y="165" font-family="Tahoma" font-size="9" fill="#111">Vierter Autor</text>
        <rect id="color-target-u4" x="12" y="35" width="75" height="38" fill="teal" />
        <text x="5" y="25" font-family="Arial" font-size="6" fill="#333">U4</text>
    </g>

    <g id="group-spine" transform="translate(232.5, 0)">
        <rect id="spine-bg" x="0" y="14" width="35" height="302" fill="silver" />
        <text id="text-spine-title" 
              x="17.5" 
              y="165" 
              font-family="Tahoma" 
              font-size="8" 
              fill="#111" 
              text-anchor="middle" 
              dominant-baseline="middle"
              transform="rotate(90 17.5 165)">Viertes Buch</text>
    </g>

    <g id="group-u1" transform="translate(267.5, 0)">
        <rect id="u1-background" x="0" y="14" width="215" height="302" fill="lightsalmon" />
        <text id="text-title" x="8" y="145" font-family="Tahoma" font-size="17" fill="#111">Der Vierte Titel</text>
        <text id="text-subtitle" x="8" y="170" font-family="Tahoma" font-size="10" fill="#111">Untertitel Vier ist hier</text>
        <rect id="color-target-u1" x="130" y="255" width="70" height="30" fill="maroon" />
         <text x="210" y="25" font-family="Arial" font-size="6" fill="#333" text-anchor="end">U1</text>
    </g>
</svg>
