<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="500mm"
   height="330mm"
   viewBox="0 0 500 330"
   version="1.1"
   id="svg-template-horizontal-ribbon"
   xml:space="preserve"
   xml:lang="de"
   xmlns="http://www.w3.org/2000/svg">

  <defs id="defs-horizontal-ribbon">
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&amp;family=Playfair+Display:wght@600;700&amp;display=swap');
    </style>
    <rect id="tpl-title_bbox" x="285" y="136" width="200" height="88" style="fill:none;stroke:none" />
    <rect id="tpl-topic_bbox" x="285" y="232" width="200" height="40" style="fill:none;stroke:none" />
  </defs>

  <!-- Untergrund gesamt (Papier) -->
  <rect id="bg-paper-base" x="0" y="0" width="500" height="330" style="fill:#F2EFE8;stroke:none" />

  <!-- Horizontal durchlaufend: Akzentstreifen + Hauptband (x=0..500, kein Sprung am R�cken) -->
  <g id="layer-fullwidth-bands" data-layer="fullwidth">
    <rect id="deco-band-accent" x="0" y="46" width="500" height="3.5" colorselector="color2" style="fill:#D4AF37;stroke:none" />
    <rect id="deco-band-main" x="0" y="51" width="500" height="76" colorselector="color1" style="fill:#14283D;stroke:none" />
    <rect id="deco-band-hairline" x="0" y="127" width="500" height="1.2" colorselector="color2" style="fill:#D4AF37;stroke:none;fill-opacity:0.65" />
  </g>

  <g id="tpl-group-spine" data-layer="spine">
    <text id="tpl-title-spine" dominant-baseline="central" data-label="Titel (Buchr&#252;cken)" transform="rotate(-90, 250, 78)" text-anchor="start" style="font-family:'Lato',sans-serif;font-size:3.6px;font-weight:700;fill:#FFFFFF;letter-spacing:0.06em" x="250" y="78">
      <tspan x="250" y="78">Titel Buchr&#252;cken</tspan>
    </text>
    <text id="tpl-name-spine" dominant-baseline="central" data-label="Name (Buchr&#252;cken)" transform="rotate(-90, 250, 94)" text-anchor="start" style="font-family:'Lato',sans-serif;font-size:3.5px;font-weight:400;fill:#D4AF37" colorselector="color2" x="250" y="94">
      <tspan x="250" y="94">NAME</tspan>
    </text>
    <text id="tpl-year-spine" dominant-baseline="central" data-label="Jahr (Buchr&#252;cken)" transform="rotate(-90, 250, 108)" text-anchor="start" style="font-family:'Lato',sans-serif;font-size:3.3px;font-weight:300;fill:#FFFFFF;fill-opacity:0.85" x="250" y="108">
      <tspan x="250" y="108">2026</tspan>
    </text>
  </g>

  <!-- U1: zentrierte Typo unter dem Band; Serif-Titel -->
  <g id="tpl-group-u1" data-layer="front">
    <text id="tpl-subtitle" data-label="Art der Arbeit" colorselector="color2" text-anchor="middle" style="font-family:'Lato',sans-serif;font-size:3.5px;font-weight:700;letter-spacing:0.2em;fill:#D4AF37" x="384" y="148">
      <tspan x="384" y="148">DISSERTATION</tspan>
    </text>

    <text id="tpl-degree" data-label="Abschluss / Studiengang" text-anchor="middle" style="font-family:'Lato',sans-serif;font-size:3.3px;font-weight:400;font-style:italic;fill:#14283D;fill-opacity:0.55" x="384" y="160">
      <tspan x="384" y="160">Promotion im Fachbereich</tspan>
    </text>

    <text id="tpl-title" data-label="Titel der Arbeit" colorselector="color1" text-anchor="middle" style="font-family:'Playfair Display',serif;font-size:13.5px;font-weight:700;fill:#14283D;letter-spacing:0.01em" x="384" y="186">
      <tspan x="384" y="186">Horizontal</tspan>
      <tspan x="384" y="206">Ribbon</tspan>
    </text>

    <text id="tpl-topic" data-label="Thema / Fach" data-multiline="true" data-max-lines="3" text-anchor="middle" style="font-family:'Lato',sans-serif;font-size:3.8px;font-weight:300;fill:#14283D;fill-opacity:0.72" x="384" y="242">
      <tspan x="384" y="242">Durchlaufendes Band &#252;ber Vorder- und</tspan>
      <tspan x="384" y="247.6">R&#252;ckseite sowie den Buchr&#252;cken.</tspan>
    </text>

    <text id="tpl-name" data-label="Name" colorselector="color1" text-anchor="middle" style="font-family:'Lato',sans-serif;font-size:6.8px;font-weight:700;fill:#14283D" x="384" y="278">
      <tspan x="384" y="278">Vorname Nachname</tspan>
    </text>

    <text id="tpl-university" data-label="Hochschule" text-anchor="middle" style="font-family:'Lato',sans-serif;font-size:3.2px;font-weight:400;fill:#14283D;fill-opacity:0.48" x="384" y="296">
      <tspan x="384" y="296">Universit&#228;t</tspan>
    </text>
    <text id="tpl-year" data-label="Jahr" text-anchor="middle" style="font-family:'Lato',sans-serif;font-size:3.2px;font-weight:400;fill:#14283D;fill-opacity:0.48" x="384" y="306">
      <tspan x="384" y="306">2026</tspan>
    </text>
  </g>

  <g id="guide-sichtbereich" style="opacity:0.4">
    <rect x="15" y="15" width="212" height="300" style="fill:none;stroke:#FF00FF;stroke-width:0.3" />
    <rect x="232.5" y="15" width="35" height="300" style="fill:none;stroke:#FF00FF;stroke-width:0.3" />
    <rect x="275.5" y="15" width="209.5" height="300" style="fill:none;stroke:#FF00FF;stroke-width:0.3" />
  </g>
</svg>
