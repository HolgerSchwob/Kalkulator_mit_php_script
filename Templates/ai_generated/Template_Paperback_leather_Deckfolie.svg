  <title
     id="title1">Paperback Deckfolie</title>
  <desc
     id="desc1">Gruppe paperback_foil (Supabase): u4/u1 204 mm, Falz 6 mm, sichtbare Höhe 297 mm. Karton nur in tpl-group-u4 / tpl-group-spine / Streifen in tpl-group-u1 — gleiche Delta-Logik wie Hardcover. Linker Überstand bis x=0; Folie/PDF nach rechts bis x=500 (Viewport im Editor schneidet wie bei Hardcover). 14 mm Karton auf U1 = rechter Falz 6 mm + 8 mm Klebezone vor sichtbarer Folie (196×297 mm).</desc>
  <!-- Hilfslinien (Webshop entfernt id guide-*) -->
  <!-- Karton U4 inkl. linkem Überstand bis x=0 (bewegt mit tpl-group-u4) -->
  <g
     id="tpl-group-u4"
     inkscape:label="tpl-group-u4">
    <g
       id="g1"
       transform="translate(22.5,16.5)">
      <rect
         id="tpl-bg-karton"
         x="-22.5"
         y="0"
         width="232.5"
         height="297"
         data-color-role="color-1"
         fill="#6b7280"
         style="fill:#000000;fill-opacity:1" />
    </g>
  </g>
  <!-- Rechter Falz + 14 mm Karton vor Folie; Folie/PDF bis rechts (Überstand viewport-geschnitten) -->
  <image
     id="tpl-pdf-page1"
     x="267.5"
     y="16.5"
     width="210"
     height="297"
     preserveAspectRatio="xMidYMid slice"
     href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
     xlink:href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" />
  <rect
     id="tpl-foil-overlay"
     x="281.5"
     y="16.5"
     width="196"
     height="297"
     data-color-role="color-2"
     fill="#e5e7eb"
     fill-opacity="0.35"
     style="stroke-width:0.960392;fill:#ffffff;opacity:0.2" />
  <rect
     id="kartonuebergriff"
     width="14"
     height="297"
     data-color-role="color-1"
     fill="#6b7280"
     pointer-events="none"
     x="267.5"
     y="16.5"
     style="fill:#000000;fill-opacity:1;stroke-width:0.632456" />
  <metadata
     id="metadata1">
    <rdf:RDF>
      <cc:Work
         rdf:about="">
        <dc:title>Paperback Deckfolie</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>
  <rect
     style="fill:#000000;stroke-width:0.258895"
     id="tpl-spine-face"
     width="35"
