<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="500mm"
   height="330mm"
   viewBox="0 0 500 330"
   version="1.1"
   id="svg-template-swiss-editorial"
   xml:space="preserve"
