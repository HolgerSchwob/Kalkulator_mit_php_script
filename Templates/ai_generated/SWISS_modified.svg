   xmlns="http://www.w3.org/2000/svg">

  <defs id="defs-swiss">
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&amp;display=swap');
    </style>
    <rect id="tpl-title_bbox" x="350" y="88" width="117.5" height="78" style="fill:none;stroke:none" />
    <rect id="tpl-topic_bbox" x="350" y="178" width="117.5" height="52" style="fill:none;stroke:none" />
  </defs>

  <!-- R�cken + U4 + �bergriff bis x=295 (Kaschier: kein Farbsprung genau auf 235/265) -->
  <g id="layer-back-spine-bg" data-layer="back">
    <rect id="bg-u4-spine-swiss" x="0" y="0" width="295" height="330" colorselector="color1" style="fill:#000000;stroke:none" />
  </g>

  <g id="tpl-group-spine" data-layer="spine">
    <text id="tpl-title-spine" dominant-baseline="central" data-label="Titel (Buchr�cken)" transform="rotate(-90, 250, 155)" text-anchor="middle" style="font-family:'Inter',sans-serif;font-size:4.2px;font-weight:600;fill:#FFFFFF" x="250" y="155">
      <tspan x="250" y="155">Titelzeile Buchr�cken</tspan>
    </text>
    <text id="tpl-name-spine" dominant-baseline="central" data-label="Name (Buchr�cken)" transform="rotate(-90, 250, 268)" text-anchor="middle" style="font-family:'Inter',sans-serif;font-size:3.8px;font-weight:700;fill:#E3000F" colorselector="color2" x="250" y="268">
      <tspan x="250" y="268">NAME</tspan>
    </text>
    <text id="tpl-year-spine" dominant-baseline="central" data-label="Jahr (Buchr�cken)" transform="rotate(-90, 250, 292)" text-anchor="middle" style="font-family:'Inter',sans-serif;font-size:3.5px;font-weight:400;fill:#FFFFFF;fill-opacity:0.75" x="250" y="292">
      <tspan x="250" y="292">2026</tspan>
    </text>
  </g>

  <!-- U1: Wei�raum links, vertikale Achse ~350, Akzent color2 -->
  <g id="tpl-group-u1" data-layer="front">
    <rect id="bg-u1-white" x="295" y="0" width="205" height="330" style="fill:#FFFFFF;stroke:none" />
    <rect id="deco-swiss-bar" x="336" y="40" width="2" height="250" colorselector="color2" style="fill:#E3000F;stroke:none" />

    <text id="tpl-subtitle" data-label="Art der Arbeit" colorselector="color2" text-anchor="start" style="font-family:'Inter',sans-serif;font-size:4px;font-weight:700;letter-spacing:0.35em;fill:#E3000F" x="350" y="58">
      <tspan x="350" y="58">DISSERTATION</tspan>
    </text>

    <text id="tpl-title" data-label="Titel der Arbeit" colorselector="color1" text-anchor="start" style="font-family:'Inter',sans-serif;font-size:16px;font-weight:900;fill:#000000;letter-spacing:-0.02em" x="350" y="95">
      <tspan x="350" y="95">Swiss</tspan>
      <tspan x="350" y="114.2">Editorial</tspan>
    </text>

    <text id="tpl-topic" data-label="Thema / Fach" data-multiline="true" data-max-lines="3" text-anchor="start" style="font-family:'Inter',sans-serif;font-size:4.2px;font-weight:300;fill:#000000;fill-opacity:0.72" x="350" y="185">
      <tspan x="350" y="185">International Typographic Style</tspan>
      <tspan x="350" y="190.8">und akademische Publikation</tspan>
    </text>

    <text id="tpl-name" data-label="Name" colorselector="color1" text-anchor="start" style="font-family:'Inter',sans-serif;font-size:7px;font-weight:600;fill:#000000" x="350" y="248">
      <tspan x="350" y="248">Vorname Nachname</tspan>
    </text>

    <text id="tpl-university" data-label="Hochschule" text-anchor="start" style="font-family:'Inter',sans-serif;font-size:3.5px;font-weight:400;fill:#000000;fill-opacity:0.45" x="350" y="288">
      <tspan x="350" y="288">Universit�t</tspan>
    </text>
    <text id="tpl-year" data-label="Jahr" text-anchor="start" style="font-family:'Inter',sans-serif;font-size:3.5px;font-weight:400;fill:#000000;fill-opacity:0.45" x="350" y="298">
      <tspan x="350" y="298">2026</tspan>
    </text>
  </g>

  <g id="guide-sichtbereich" style="opacity:0.4">
    <rect x="15" y="15" width="212" height="300" style="fill:none;stroke:#FF00FF;stroke-width:0.3" />
    <rect x="235" y="15" width="30" height="300" style="fill:none;stroke:#FF00FF;stroke-width:0.3" />
    <rect x="273" y="15" width="212" height="300" style="fill:none;stroke:#FF00FF;stroke-width:0.3" />
  </g>

  <g id="Mittelmarke" pointer-events="none" data-layer="production-mark">
    <rect x="248.5" y="0" width="3" height="10" fill="#ffffff" stroke="none"/>
    <rect x="248.5" y="320" width="3" height="10" fill="#ffffff" stroke="none"/>
    <line x1="250" y1="0" x2="250" y2="10" stroke="#000000" stroke-width="1" stroke-linecap="butt"/>
    <line x1="250" y1="330" x2="250" y2="320" stroke="#000000" stroke-width="1" stroke-linecap="butt"/>
  </g>
</svg>
